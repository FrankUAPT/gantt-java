# H2 Database Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# The /h2-console path is relative to the servlet context path,
# so if your app runs at localhost:8080, console will be localhost:8080/h2-console

# Datasource Properties
spring.datasource.url=jdbc:h2:mem:ganttchartdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA Properties
spring.jpa.hibernate.ddl-auto=update
# 'update': updates the schema if necessary, good for development
# 'create-drop': creates schema at startup, drops at shutdown - useful for testing
# 'validate': validates the schema, makes no changes to the database
# 'none': does nothing
spring.jpa.show-sql=true # Show SQL queries in the console, useful for debugging
