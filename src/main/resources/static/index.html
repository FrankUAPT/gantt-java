<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Chart Application</title>
    <!-- Include jQuery from a CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Hello Gantt Chart!</h1>

    <!-- Placeholder for task list -->
    <div id="taskList">
        <h2>Tasks</h2>
        <ul id="tasks">
            <!-- Tasks will be loaded here by JavaScript -->
        </ul>
    </div>

    <!-- Placeholder for Gantt chart area -->
    <div id="ganttChartArea">
        <h2>Gantt Chart</h2>
        <!-- Gantt chart will be rendered here -->
    </div>

    <script>
        $(document).ready(function() {
            // Initial jQuery code can go here later
            console.log("Document ready. jQuery is loaded.");
        });
    </script>
</body>
</html>
